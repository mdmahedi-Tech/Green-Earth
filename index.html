<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>green-earth</title>


    <!-- Tailwind and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">

</head>

<body>

   
<main class="container mx-auto text-center">
    <h1 class="text-green-600 font-serif text-4xl">choose your trees</h1>
    <section class="grid grid-cols-12 gap-4">
    <!-- category here -->
        <div class="bg-white car card-body drop-shadow-2xl col-span-3">      
               <h1 class="font-bold">category</h1>
         <button class="btn btn-success w-full" id="alltreesbutton">all trees</button>
         <!-- dynamic button will be here by js -->
         <div id="catagery-container">

         </div>
        </div>
        <!-- Category added -->
        <div class="col-span-6">
            <div id="treeContainer" class="bg-white car card-body drop-shadow-2xl grid grid-cols-1 sm:grid-cols-3 gap-3">
                  <!-- dynamicaly added here -->
            
        </div>
             <!-- loadng speener -->
           <div id="loadingspeener" class=" hidden justify-center items-center">
           <span class="loading loading-spinner text-error"></span>
            </div>           
        </div>
        <!-- cart start -->
        <div class="bg-white col-span-3">
           <h2 class="font-bold text-2xl mb-2">your cart</h2>
           <!-- <div class="space-y-2"> -->
            <div id="cartContainer" class="bg-cyan-200 ">
              
            </div> 
           
            <!-- totall price -->
            <div class="bg-cyan-200 flex justify-between">
            <span class="font-bold text-2xl">totall</span>
           <span id="price">price</span>
           
             </div>

           </div>
           
        </div>

        <!-- show modal -->
       
    </section>
</main>


 
<!-- js -->
 <script src="./script.js"></script>
</body>

</html>
